name: Validate Plugins

on:
  pull_request:
    paths:
      - 'plugins/**/*.md'
      - 'tools/validate-*.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-agents.yml'
  push:
    branches:
      - main
    paths:
      - 'plugins/**/*.md'
      - 'tools/validate-*.js'

jobs:
  validate:
    name: Validate agents and skills against frameworks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate agents (errors only — warnings do not block)
        run: node tools/validate-agent.js all --errors-only

      - name: Validate skills (errors only — warnings do not block)
        run: node tools/validate-skill.js all --errors-only

      - name: Validate commands (errors only — warnings do not block)
        run: node tools/validate-command.js all --errors-only

      - name: Full report (agents + skills + commands, informational)
        if: always()
        run: |
          echo "=== Agents ==="
          node tools/validate-agent.js all || true
          echo ""
          echo "=== Skills ==="
          node tools/validate-skill.js all || true
          echo ""
          echo "=== Commands ==="
          node tools/validate-command.js all || true
